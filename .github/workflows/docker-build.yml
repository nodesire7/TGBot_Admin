name: Build, Test and Deploy

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: docker.io
  API_IMAGE: nodesire7/tgbot-admin-api
  BOT_IMAGE: nodesire7/tgbot-admin-bot

jobs:
  # ============================================
  # Stage 1: Build & Test
  # ============================================
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download Go dependencies
        working-directory: api
        run: go mod download

      - name: Verify Go dependencies
        working-directory: api
        run: go mod verify

      - name: Install Python dependencies
        working-directory: bot
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Go API
        working-directory: api
        run: CGO_ENABLED=0 go build -v -o main .

      - name: Test Go API
        working-directory: api
        run: go test -v ./... || echo "No tests yet"
        continue-on-error: true

      - name: Lint Python Bot
        working-directory: bot
        run: python -m py_compile main.py
        continue-on-error: true

  # ============================================
  # Stage 2: Docker Build & Push
  # ============================================
  docker-push:
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.API_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract metadata for Bot
        id: meta-bot
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BOT_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Bot image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.bot
          push: true
          tags: ${{ steps.meta-bot.outputs.tags }}
          labels: ${{ steps.meta-bot.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "✅ Build completed successfully!"
          echo "📦 Images pushed:"
          echo "   - ${{ env.API_IMAGE }}:latest"
          echo "   - ${{ env.BOT_IMAGE }}:latest"

  # ============================================
  # Stage 3: Docker Build Only (PR)
  # ============================================
  docker-build-pr:
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.api
          push: false
          platforms: linux/amd64

      - name: Build Bot image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.bot
          push: false
          platforms: linux/amd64

      - name: Summary
        run: echo "✅ PR build test passed"
