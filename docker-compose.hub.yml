# docker-compose.hub.yml - 使用预构建的 Docker Hub 镜像
# 单容器全功能部署 (API + Bot + Web UI)

version: '3.8'

services:
  tgbot-admin:
    image: nodesire7/tgbot-admin:latest
    container_name: tgbot_admin
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-tgbot}
      - DB_PASSWORD=${DB_PASSWORD:-tgbot123}
      - DB_NAME=${DB_NAME:-tgbot}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - BOT_TOKEN=${BOT_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:15-alpine
    container_name: tgbot_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER:-tgbot}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-tgbot123}
      - POSTGRES_DB=${DB_NAME:-tgbot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tgbot} -d ${DB_NAME:-tgbot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tgbot_redis
    restart: unless-stopped
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
